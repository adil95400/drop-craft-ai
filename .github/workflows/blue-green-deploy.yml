name: Blue-Green Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target (blue or green)"
        required: true
        default: "green"
        type: choice
        options: [blue, green]
      skip_health_check:
        description: "Skip post-deploy health check"
        type: boolean
        default: false

concurrency:
  group: blue-green-deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: "20"

jobs:
  deploy-slot:
    name: 🟢 Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline --no-audit --progress=false

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_DEPLOY_SLOT: ${{ inputs.environment }}
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to slot
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health check
        if: ${{ !inputs.skip_health_check }}
        run: |
          echo "🏥 Checking ${{ steps.deploy.outputs.url }}..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i — status $STATUS, retrying..."
            sleep 5
          done
          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Smoke test
        if: ${{ !inputs.skip_health_check }}
        run: |
          BODY=$(curl -s "${{ steps.deploy.outputs.url }}")
          if echo "$BODY" | grep -q "<!DOCTYPE html>"; then
            echo "✅ Smoke test passed — valid HTML response"
          else
            echo "❌ Smoke test failed — unexpected response"
            exit 1
          fi

  promote-to-production:
    name: 🚀 Promote to production
    needs: deploy-slot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Promote deployment
        run: |
          echo "🔄 Promoting ${{ inputs.environment }} slot to production..."
          vercel promote ${{ needs.deploy-slot.outputs.url }} --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || \
          vercel alias set ${{ needs.deploy-slot.outputs.url }} ${{ secrets.PRODUCTION_DOMAIN }} --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Summary
        run: |
          echo "## 🟢 Blue-Green Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Slot:** ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Date:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
