name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  CI: true

jobs:
  e2e:
    name: 🎭 E2E (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-e2e-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: vite-e2e-${{ runner.os }}-

      - run: npm ci --prefer-offline --no-audit --progress=false

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Run Playwright
        run: |
          npx serve dist -l 8080 &
          npx wait-on http://127.0.0.1:8080 --timeout 60000
          npx playwright test --project=smoke --shard=${{ matrix.shard }}
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  e2e-summary:
    name: 🎭 E2E Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [e2e]
    steps:
      - run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "❌ E2E tests failed"
            exit 1
          fi
          echo "✅ All E2E shards passed"
