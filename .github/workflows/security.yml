name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  FAIL_SEVERITY: high

jobs:
  # ── Dependency Review (PR only) ──
  dependency-review:
    name: 📦 Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: ${{ env.FAIL_SEVERITY }}

  # ── CodeQL SAST ──
  codeql:
    name: 🛡️ CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline --no-audit --progress=false
      - run: npm run build
        continue-on-error: true

      - uses: github/codeql-action/analyze@v3

  # ── Secret scanning ──
  secret-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: trufflesecurity/trufflehog@v3
        with:
          path: .
          base: HEAD~1
          head: HEAD

  # ── NPM audit ──
  npm-audit:
    name: 📋 NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --prefer-offline --no-audit --progress=false
      - run: npm audit --audit-level=${{ env.FAIL_SEVERITY }} || true
      - run: npm audit --json > npm-audit.json
      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 30

  # ── OSV Scanner ──
  osv-scan:
    name: 🔎 OSV Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action@v1
        with:
          scan-args: "-r ."
        continue-on-error: true

  # ── Hardcoded secrets grep ──
  secrets-grep:
    name: 🔒 Hardcoded Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          if grep -rE "(api[_-]?key|secret[_-]?key|password|token)\s*[:=]\s*['\"][a-zA-Z0-9_\-]{10,}['\"]" src/ --include="*.ts" --include="*.tsx" \
            | grep -v ".test." | grep -v "placeholder" | grep -v "example"; then
            echo "::error::Potential hardcoded secrets found"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  # ── Snyk (optional) ──
  snyk:
    name: 🐛 Snyk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.SNYK_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --prefer-offline --no-audit --progress=false
      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # ── Security gate ──
  security-gate:
    name: ✅ Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [codeql, secret-scan, npm-audit, secrets-grep]
    steps:
      - run: |
          echo "## 🛡️ Security Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NPM Audit | ${{ needs.npm-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hardcoded Secrets | ${{ needs.secrets-grep.result }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.codeql.result }}" != "success" ] || \
             [ "${{ needs.secret-scan.result }}" != "success" ] || \
             [ "${{ needs.secrets-grep.result }}" != "success" ]; then
            exit 1
          fi
