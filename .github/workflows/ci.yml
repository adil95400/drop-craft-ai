name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "20"
  CI: true

defaults:
  run:
    shell: bash

jobs:
  # ── Lint & Type-check ──
  lint:
    name: 🔍 Lint & Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-lint-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: vite-lint-${{ runner.os }}-

      - run: npm ci --prefer-offline --no-audit --progress=false
      - run: npx tsc --noEmit
      - run: npx eslint src/ --max-warnings 0

  # ── Unit tests (Vitest) ──
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-test-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: vite-test-${{ runner.os }}-

      - run: npm ci --prefer-offline --no-audit --progress=false
      - run: npm run test -- --coverage --reporter=github-actions

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Build ──
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*') }}
          restore-keys: vite-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - run: npm ci --prefer-offline --no-audit --progress=false

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Bundle size report
        run: |
          echo "## 📦 Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total | $(du -sh dist | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JS | $(find dist -name '*.js' -exec du -ch {} + 2>/dev/null | tail -1 | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CSS | $(find dist -name '*.css' -exec du -ch {} + 2>/dev/null | tail -1 | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Merge gate ──
  merge-gate:
    name: ✅ Merge Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, unit-tests, build]
    steps:
      - name: Evaluate
        run: |
          echo "## Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ needs.unit-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Merge blocked" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ All checks passed" >> "$GITHUB_STEP_SUMMARY"
